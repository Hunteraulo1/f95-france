name: f95france-dashboard-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: f96-trad-dash-app
    restart: unless-stopped
    env_file: .env

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      MARIADB_HOST: mariadb-dev

    ports:
      - '${APP_PORT:-3000}:3000'

    depends_on:
      mariadb-dev:
        condition: service_healthy

    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mariadb-dev:
    image: mariadb:11.4
    container_name: f96-trad-dash-mariadb-dev
    restart: unless-stopped
    env_file: .env

    # Même collation que prod/PTB (utf8mb4_bin) — évite les écarts LIKE / comparaisons de chaînes.
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin

    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}

    ports:
      - '127.0.0.1:3306:3306'

    volumes:
      - mariadb_dev_data:/var/lib/mysql

    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--su-mysql', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_dev_data:
