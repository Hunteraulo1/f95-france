services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: f95-france-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: f95france
      POSTGRES_USER: f95france
      POSTGRES_PASSWORD: f95france
    ports:
      - '5433:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U f95france -d f95france']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
