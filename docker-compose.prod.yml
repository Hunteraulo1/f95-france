name: f95france-dashboard

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

    expose:
      - '3000'

    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - '-T'
        - '5'
        - 'http://127.0.0.1:3000/api/health'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.services.f95-prod.loadbalancer.server.port=3000

    networks:
      - coolify

networks:
  coolify:
    external: true
