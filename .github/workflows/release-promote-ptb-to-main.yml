# Ouvre ou met à jour une PR `ptb` → `main` après promotion release (sans approbation ni fusion auto).
#
# Déclencheurs :
# - Fin réussie du workflow « Release promote dev → ptb » (merge dev→ptb)
# - Push release cz-emoji sur `ptb` (`:bookmark: vX.Y.Z`)
# - workflow_dispatch (force)
#
# Prérequis : mêmes permissions Actions que dev→ptb (création de PR par GITHUB_TOKEN).

name: Release open PR ptb → main

on:
  push:
    branches:
      - ptb
  workflow_run:
    workflows:
      - Release promote dev → ptb
    types:
      - completed
  workflow_dispatch:
    inputs:
      force:
        description: Forcer l'ouverture de la PR (sans vérifier le sujet du commit)
        required: false
        default: false
        type: boolean

concurrency:
  group: release-open-pr-ptb-to-main
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  SOURCE_BRANCH: ptb
  TARGET_BRANCH: main

jobs:
  open-pr:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_commit != null &&
        contains(github.event.workflow_run.head_commit.message, ':bookmark: v')
      ) ||
      (
        github.event_name == 'push' &&
        github.event.head_commit != null &&
        contains(github.event.head_commit.message, ':bookmark: v')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ptb
          fetch-depth: 0

      - name: Détecter version release
        id: gate
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          FROM_WORKFLOW_RUN: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          SUBJECT="$(git log -1 --format=%s)"
          echo "Sujet du commit sur ${SOURCE_BRANCH} (${GITHUB_SHA}): $SUBJECT"

          if [ "$FORCE" = "true" ] || [ "$FROM_WORKFLOW_RUN" = "true" ]; then
            VERSION="$(printf '%s' "$SUBJECT" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
            if [ -z "$VERSION" ]; then
              VERSION="$(git log "${SOURCE_BRANCH}" -20 --format=%s | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
            fi
            if [ -z "$VERSION" ]; then
              VERSION="v$(node -p "require('./package.json').version")"
            fi
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Release (force ou après promote dev→ptb): $VERSION"
            exit 0
          fi

          if printf '%s' "$SUBJECT" | grep -qE '^Merge '; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Commit de merge — PR ptb→main non ouverte (attendre workflow_run après promote dev→ptb)."
            exit 0
          fi
          if printf '%s' "$SUBJECT" | grep -qE '^(fix|feat|chore|docs|refactor|test|style|perf|ci|build)(\(|:)|^\[)'; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Commit conventionnel — ignoré."
            exit 0
          fi

          VERSION="$(printf '%s' "$SUBJECT" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "$VERSION" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$SUBJECT" | grep -qE '^:bookmark: v[0-9]+\.[0-9]+\.[0-9]+'; then
            :
          elif printf '%s' "$SUBJECT" | grep -qE '^.{0,8}v[0-9]+\.[0-9]+\.[0-9]+'; then
            :
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release détectée: $VERSION"

      - name: Créer ou mettre à jour la PR (revue manuelle)
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number() {
            gh pr list \
              --base "$TARGET_BRANCH" \
              --head "$SOURCE_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          }

          EXISTING="$(pr_number)"

          TITLE=":bookmark: ${{ steps.gate.outputs.version }} (${SOURCE_BRANCH} → ${TARGET_BRANCH})"
          BODY="PR ouverte automatiquement pour la release \`${{ steps.gate.outputs.version }}\`.

          - **Source** : \`${SOURCE_BRANCH}\`
          - **Cible** : \`${TARGET_BRANCH}\`
          - **Commit** : \`${{ github.sha }}\`
          - **Auteur workflow** : @${{ github.actor }}

          **Fusion manuelle requise** — cette PR n'est ni approuvée ni fusionnée par Actions."

          if [ -n "$EXISTING" ]; then
            echo "PR existante #$EXISTING — mise à jour"
            gh pr edit "$EXISTING" --title "$TITLE" --body "$BODY"
            echo "https://github.com/${{ github.repository }}/pull/$EXISTING"
          else
            set +e
            CREATE_OUT="$(gh pr create \
              --base "$TARGET_BRANCH" \
              --head "$SOURCE_BRANCH" \
              --title "$TITLE" \
              --body "$BODY" 2>&1)"
            CREATE_STATUS=$?
            set -e
            if [ "$CREATE_STATUS" -ne 0 ]; then
              printf '%s\n' "$CREATE_OUT" >&2
              if printf '%s' "$CREATE_OUT" | grep -q 'not permitted to create or approve pull requests'; then
                echo "::error::Activez la creation de PR par Actions (Settings → Actions → Workflow permissions)."
              fi
              exit "$CREATE_STATUS"
            fi
            printf '%s\n' "$CREATE_OUT"
            NUMBER="$(pr_number)"
            if [ -n "$NUMBER" ]; then
              echo "https://github.com/${{ github.repository }}/pull/$NUMBER"
            fi
          fi
