components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: auth-session
      description: |
        Cookie de session émis après connexion sur le site (tableau de bord). Envoyé automatiquement par le navigateur pour les requêtes same-site.
    ApiKeyBearer:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: |
        Valeur complète de la clé API (ex. préfixe `f95ext_…`). Équivalent à l’en-tête `X-Api-Key`.
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
      description: |
        Même secret que pour l’en-tête Authorization avec schéma Bearer (valeur = clé complète).

  parameters:
    GameId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GameWebsite:
      name: website
      in: query
      required: false
      description: |
        Code du site d’origine du jeu, comme dans le champ `website` de chaque jeu (ex. `f95z`, `lc`, `other`).
        Si absent, tous les jeux sont renvoyés.
      schema:
        type: string
        maxLength: 32
        example: f95z
    Include:
      name: include
      in: query
      required: false
      description: |
        Ressources liées à inclure. Liste séparée par des virgules (insensible à la casse).
        - `translations` — sur **`/api/games`** et **`/api/games/{id}`** : ajoute `translations` sur le jeu. Sur **`/api/updates`** et **`/api/updates/{id}`** : ajoute `translations` **dans** l’objet `game` (jeu minimal `id` + `translations` si `game` n’est pas demandé ; sinon jeu enrichi + `translations`).
        - `game` — sur **`/api/updates`** et **`/api/updates/{id}`** : enrichit l’objet `game` (moteurs, étiquettes, etc.). Peut se combiner avec : `include=game,translations`.
      schema:
        type: string
        example: translations,game
    TranslationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TranslationFilterGameId:
      name: gameId
      in: query
      required: false
      description: Ne garde que les traductions liées à ce jeu (UUID).
      schema:
        type: string
        format: uuid
    TranslationFilterStatus:
      name: status
      in: query
      required: false
      description: Égalité stricte sur le champ `status` (valeur telle qu’en base, p.ex. `in_progress`).
      schema:
        type: string
        maxLength: 32
    TranslationFilterGameType:
      name: gameType
      in: query
      required: false
      description: Égalité stricte sur le champ `gameType` (ex. `renpy`, `unity`, `other`).
      schema:
        type: string
        maxLength: 32
    TranslationFilterVersionMatchesTversion:
      name: versionMatchesTversion
      in: query
      required: false
      description: |
        `true` : `version` non nul et égal à `tversion`.
        `false` : `version` nul ou différent de `tversion`.
        Si absent, pas de filtre sur cette condition.
      schema:
        type: boolean
    TranslatorId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UpdateId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TranslatorTradCountMin:
      name: tradCountMin
      in: query
      required: false
      description: Borne inférieure inclusive sur `tradCount`.
      schema:
        type: integer
        minimum: 0
    TranslatorTradCountMax:
      name: tradCountMax
      in: query
      required: false
      description: Borne supérieure inclusive sur `tradCount`.
      schema:
        type: integer
        minimum: 0
    TranslatorReadCountMin:
      name: readCountMin
      in: query
      required: false
      description: Borne inférieure inclusive sur `readCount`.
      schema:
        type: integer
        minimum: 0
    TranslatorReadCountMax:
      name: readCountMax
      in: query
      required: false
      description: Borne supérieure inclusive sur `readCount`.
      schema:
        type: integer
        minimum: 0
    TranslatorHasDiscord:
      name: hasDiscord
      in: query
      required: false
      description: |
        `true` : seulement les traducteurs avec un identifiant Discord (`discordId` non nul).
        `false` : seulement ceux sans `discordId`.
        Si vous omettez ce paramètre, la réponse inclut les deux cas (avec ou sans Discord).
      schema:
        type: boolean
    UpdatesStartDate:
      name: startDate
      in: query
      required: false
      description: |
        Borne inférieure **inclusive** sur la date de création de l’entrée (`updateCreatedAt`).
        ISO 8601 complet ou date seule `AAAA-MM-JJ` (interprétée en **minuit UTC**).
      schema:
        type: string
        example: '2024-01-15'
    UpdatesEndDate:
      name: endDate
      in: query
      required: false
      description: |
        Borne supérieure **inclusive** sur `updateCreatedAt`.
        ISO 8601 complet ou date seule `AAAA-MM-JJ` (journée entière jusqu’à **23:59:59.999 UTC**).
      schema:
        type: string
        example: '2024-01-31'

  responses:
    Unauthorized:
      description: |
        Session absente ou expirée, ou clé API manquante / invalide / révoquée / expirée.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    TooManyRequests:
      description: Quota de requêtes par minute dépassé pour cette clé API.
      headers:
        Retry-After:
          description: Délai recommandé avant un nouvel essai (secondes).
          schema:
            type: integer
            example: 60
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ServerError:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    ErrorBody:
      type: object
      description: Réponse d’erreur (codes HTTP 4xx ou 5xx).
      properties:
        error:
          type: string
          description: Message d’erreur lisible.

    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tags:
          type: string
          description: Tags séparés par des virgules (texte brut)
        image:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        website:
          type: string
          description: Code site (ex. f95z, lc)
        threadId:
          type: integer
          nullable: true
        link:
          type: string
        gameAutoCheck:
          type: boolean
        gameVersion:
          type: string
          nullable: true
        translations:
          type: array
          description: |
            Présent uniquement si la requête contient `include=translations` (éventuellement avec d’autres valeurs séparées par des virgules). Tri par date `updatedAt` décroissante.
          items:
            $ref: '#/components/schemas/GameTranslation'

    GameTranslation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gameId:
          type: string
          format: uuid
        translationName:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        status:
          type: string
          description: Valeur technique renvoyée par l’API (p.ex. in_progress, completed, abandoned).
        tversion:
          type: string
        tlink:
          type: string
        tname:
          type: string
        translatorId:
          type: string
          nullable: true
        proofreaderId:
          type: string
          nullable: true
        ttype:
          type: string
        gameType:
          type: string
          description: Moteur ou techno (codes renpy, unity, other, …).
        ac:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TranslatorPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        discordId:
          type: string
          nullable: true
        pages:
          type: string
          description: JSON ou texte des pages / liens
        tradCount:
          type: integer
          nullable: true
        readCount:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdatePublic:
      type: object
      required: [updateId, updateStatus, updateCreatedAt, updateUpdatedAt, gameId]
      properties:
        updateId:
          type: string
          format: uuid
        updateStatus:
          type: string
        updateCreatedAt:
          type: string
          format: date-time
        updateUpdatedAt:
          type: string
          format: date-time
        gameId:
          type: string
          format: uuid
        game:
          description: |
            Présent si la requête contient `include=game` et/ou `include=translations`.
            - `include=game` : champs enrichis (sans tableau `translations` sauf si `include=translations` est aussi présent).
            - `include=translations` seul : uniquement les clés `id` et `translations` (pas de `name`, `image`, etc.).
            - Les deux : jeu enrichi avec `translations` à l’intérieur de `game`.
          type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              description: Présent si `include=game`
            image:
              type: string
            link:
              type: string
            website:
              type: string
            threadId:
              type: integer
              nullable: true
            gameVersion:
              type: string
              nullable: true
            type:
              type: string
              description: Premier moteur de la liste ou la valeur technique `other` (si `include=game`).
            engineTypes:
              type: array
              items:
                type: string
            tags:
              type: string
            translations:
              type: array
              description: |
                Présent si la requête contient `include=translations`. Traductions du jeu, tri par `updatedAt` décroissant.
              items:
                $ref: '#/components/schemas/GameTranslation'
