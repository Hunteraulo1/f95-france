name: f95france-dashboard

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: f96-trad-dash-app
    restart: unless-stopped

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

    ports:
      - '${APP_PORT:-3000}:3000'

    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - coolify

networks:
  coolify:
    external: true
