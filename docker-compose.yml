name: f95france-dashboard

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: f96-trad-dash-app
    restart: unless-stopped
    env_file: .env

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGSSLMODE: disable
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}

    ports:
      - '${APP_PORT:-3000}:3000'

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.4-alpine
    container_name: f96-trad-dash-postgres
    restart: unless-stopped
    env_file: .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - '${TAILSCALE_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

    shm_size: 128mb

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  postgres_data:
